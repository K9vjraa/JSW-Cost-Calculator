##############################################################################
# GitHub Actions CI/CD Pipeline — JSW MCMS
# Triggers: push to main/develop, pull requests
# Jobs: lint → test → build → docker push (on main)
##############################################################################

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/jsw-mcms

jobs:
  # ── Job 1: Lint & Type Check ──────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: "postgresql://mcms:mcms@localhost:5432/mcms"

      - name: Type check backend
        run: npx tsc --noEmit
        working-directory: apps/backend

      - name: Type check frontend
        run: npx tsc -b
        working-directory: apps/frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: apps/frontend

  # ── Job 2: Run Tests ──────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mcms_test
          POSTGRES_USER: mcms
          POSTGRES_PASSWORD: mcms_test_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcms -d mcms_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations (test DB)
        run: npx prisma migrate deploy
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://mcms:mcms_test_secret@localhost:5432/mcms_test?schema=public

      - name: Run backend tests
        run: npm test --workspace=apps/backend
        env:
          DATABASE_URL: postgresql://mcms:mcms_test_secret@localhost:5432/mcms_test?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-at-least-16-chars
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-16-chars
          CLIENT_ORIGIN: http://localhost:5173
          NODE_ENV: test

  # ── Job 3: Production Build Verification ──────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: "postgresql://mcms:mcms@localhost:5432/mcms"

      - name: Build backend
        run: npm run build --workspace=apps/backend

      - name: Build frontend
        run: npm run build --workspace=apps/frontend
        env:
          VITE_API_URL: https://your-backend.up.railway.app/api
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/frontend/dist
          retention-days: 7

  # ── Job 4: Docker Build & Push (main branch only) ─────────────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (backend)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (frontend)
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-client
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 5: Railway Deploy (main branch only) ──────────────────────────────
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service mcms-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
