##############################################################################
# JSW MCMS — Production Nginx Configuration
# Features: SPA fallback, gzip compression, security headers, asset caching
##############################################################################

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self';
         script-src 'self' 'unsafe-inline' 'unsafe-eval';
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src 'self' https://fonts.gstatic.com data:;
         img-src 'self' data: blob:;
         connect-src 'self' https: wss:;
         frame-ancestors 'none';"
        always;

    # ── Strict Transport Security (set on reverse proxy/CDN instead) ─────────
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Static Asset Caching ──────────────────────────────────────────────────
    # Hashed assets (JS/CSS chunks from Vite) → immutable long cache
    location ~* \.(js|css|woff|woff2|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No-cache for HTML (ensures fresh SPA entry point on deploy)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── SPA Client-Side Routing Fallback ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health Check Endpoint ─────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"mcms-client"}';
        add_header Content-Type application/json;
    }

    # ── Deny Hidden Files ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log combined;
}
