  # ─── Backend API (Node.js/Express Production Build) ──────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: production
    container_name: mcms-api-prod
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: production-jsw-mcms-access-secret-32-characters
      JWT_REFRESH_SECRET: production-jsw-mcms-refresh-secret-32-characters
      CLIENT_ORIGIN: http://localhost
      LOG_LEVEL: info
#    depends_on:
#      postgres:
#        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - mcms-network-prod

  # ─── Frontend Client (React/Nginx Production Build) ──────────────────────────
  client:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: production
      args:
        VITE_API_URL: http://localhost:5000/api/v1
        NODE_ENV: production
    container_name: mcms-client-prod
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - mcms-network-prod

#volumes:
#  postgres_data_prod:
#    driver: local

networks:
  mcms-network-prod:
    driver: bridge
